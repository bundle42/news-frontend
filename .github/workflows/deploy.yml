name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Copy dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 13.125.227.226
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          source: "dist/" # 테스트
          target: "/home/ec2-user/dist"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.125.227.226
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo rm -rf /usr/share/nginx/html/*
            sudo cp -r /home/ec2-user/dist/* /usr/share/nginx/html/
            sudo systemctl restart nginx
